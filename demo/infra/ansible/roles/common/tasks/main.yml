- name: Update apt cache
  apt:
    update_cache: yes
    upgrade: yes

- name: Install base packages
  apt:
    name:
      - curl
      - ufw
      - unattended-upgrades
    state: present

- name: UFW - allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: UFW - allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: UFW - allow HTTPS from Cloudflare only
  ufw:
    rule: allow
    port: "443"
    proto: tcp
    src: "{{ item }}"
    comment: Cloudflare
  loop:
    - 173.245.48.0/20
    - 103.21.244.0/22
    - 103.22.200.0/22
    - 103.31.4.0/22
    - 141.101.64.0/18
    - 108.162.192.0/18
    - 190.93.240.0/20
    - 188.114.96.0/20
    - 197.234.240.0/22
    - 198.41.128.0/17
    - 162.158.0.0/15
    - 104.16.0.0/13
    - 104.24.0.0/14
    - 172.64.0.0/13
    - 131.0.72.0/22

- name: UFW - enable
  ufw:
    state: enabled
    policy: deny

- name: Disable root SSH password login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin prohibit-password"
  notify: restart sshd
