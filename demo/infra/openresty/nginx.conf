worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens off;

    # Log dùng CF-Connecting-IP để fail2ban ban đúng IP user thật
    log_format main '$http_cf_connecting_ip - [$time_local] "$request" $status "$http_user_agent"';
    access_log /usr/local/openresty/nginx/logs/access.log main;
    error_log  /usr/local/openresty/nginx/logs/error.log warn;

    # Rate limit zones — key là CF-Connecting-IP (real user IP, không phải CF IP)
    limit_req_zone $http_cf_connecting_ip zone=api:10m rate=30r/m;
    limit_req_zone $http_cf_connecting_ip zone=fe:10m  rate=60r/m;

    include /usr/local/openresty/nginx/conf/sites-enabled/*.conf;
}
