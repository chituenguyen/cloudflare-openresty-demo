# HTTP → HTTPS redirect
server {
    listen 80;
    server_name blog360.org api.blog360.org;
    return 301 https://$host$request_uri;
}

# ============================================================
# Frontend — blog360.org → :4000
# ============================================================
server {
    listen 443 ssl;
    server_name blog360.org;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Restore real IP từ Cloudflare header
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # Rate limit: 60 req/min, burst 20
    limit_req zone=fe burst=20 nodelay;
    limit_req_status 429;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; frame-src https://challenges.cloudflare.com; connect-src 'self' https://api.blog360.org;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Block bad user agents
    if ($http_user_agent ~* (curl|wget|python|httpx|go-http|java|scrapy|libwww)) {
        return 403;
    }

    # Block common scan paths
    location ~* \.(env|git|sql|bak|log)$ { return 403; }
    location ~* ^/(wp-admin|phpinfo|phpmyadmin) { return 403; }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ============================================================
# Backend API — api.blog360.org → :3001
# ============================================================
server {
    listen 443 ssl;
    server_name api.blog360.org;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # Rate limit: 30 req/min, burst 10
    limit_req zone=api burst=10 nodelay;
    limit_req_status 429;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer" always;

    if ($http_user_agent ~* (curl|wget|python|httpx|go-http|java|scrapy|libwww)) {
        return 403;
    }

    # /auth/token — không cần JWT (đây là endpoint lấy token)
    location = /auth/token {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }

    # Mọi route còn lại → verify JWT tại gateway bằng Lua
    # Node.js backend không cần biết gì về auth
    location / {
        access_by_lua_block {
            -- CORS preflight không có Authorization header → bỏ qua JWT check
            if ngx.req.get_method() == "OPTIONS" then
                return
            end

            local jwt = require "resty.jwt"
            local secret = os.getenv("JWT_SECRET") or "super-secret-key-change-in-prod"

            local auth = ngx.req.get_headers()["Authorization"]
            if not auth then
                ngx.status = 403
                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"error":"Missing token"}')
                return ngx.exit(403)
            end

            local token = auth:match("Bearer (.*)")
            if not token then
                ngx.status = 403
                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"error":"Invalid authorization header"}')
                return ngx.exit(403)
            end

            local obj = jwt:verify(secret, token)
            if not obj.verified then
                ngx.status = 403
                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"error":"' .. (obj.reason or "Invalid token") .. '"}')
                return ngx.exit(403)
            end
        }

        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
