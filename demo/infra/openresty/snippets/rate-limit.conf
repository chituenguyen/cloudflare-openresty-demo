# Rate limit zones - define ở http block (nginx.conf)
# limit_req_zone $http_cf_connecting_ip zone=api:10m rate=30r/m;
# limit_req_zone $http_cf_connecting_ip zone=api_burst:10m rate=5r/s;

# Dùng CF-Connecting-IP thay vì $remote_addr
# vì $remote_addr lúc này là IP của Cloudflare, không phải user thật

limit_req zone=api burst=10 nodelay;
limit_req_status 429;